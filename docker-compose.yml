services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ceylog
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema:/docker-entrypoint-initdb.d
    networks: [logisticsmind]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ceylog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks: [logisticsmind]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seeder:
    build: .
    command: python -m db.seed.seed
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    networks: [logisticsmind]
    profiles: ["seed"]

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    networks: [logisticsmind]

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api]
    networks: [logisticsmind]

networks:
  logisticsmind:
    driver: bridge

volumes:
  postgres_data:
